findings:
  - practical_focus: Book is highly practical - 8 complete meal plans with shopping lists, prep steps, and recipes
  - calorie_baseline: Default recipes designed for 150 lb moderately active person
  - 90_10_rule: Novel sustainability concept not found in other books
  - 10_percent_rule: Practical adjustment rule that aligns with Helms/Nippard conservative deficit approach
  - acknowledged_researchers: Stern acknowledges Schoenfeld, Israetel, Huberman, Tumminello, Patrick, Lyon
  - carb_cycling: Simpler implementation than Nippard's - day-based rather than meal-based
  - macro_insight: "Protein as fixed macro, carbs/fats inverse" is a practical simplification

